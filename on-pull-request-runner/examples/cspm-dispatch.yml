# Dispatch-triggered CSPM triage — phase 1 MVP.
# Manually trigger to triage a specific (or auto-selected) CSPM alert
# against the checked-out repository without requiring an open PR.
#
# Usage:
#   gh workflow run cspm-dispatch.yml \
#     -f observation-id=<wiz-observation-id> \
#     -f source-path=terraform/gcp
#
# Or trigger from the GitHub Actions UI: Actions > Gomboc CSPM Triage > Run workflow
name: Gomboc CSPM Triage

on:
  workflow_dispatch:
    inputs:
      observation-id:
        description: 'Wiz/CSPM observation ID to triage (blank = auto-select top match)'
        required: false
        default: ''
      source-path:
        description: 'Repo-relative path to scan for IaC (blank = repo root)'
        required: false
        default: ''

permissions:
  contents: read
  pull-requests: write

jobs:
  cspm-triage:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: Gomboc-AI/actions/on-pull-request-runner@DEV-4593-cspm-fix-full-agent-loop
        with:
          mode: audit
          cspm-observation-id: ${{ inputs.observation-id }}
          cspm-source-path: ${{ inputs.source-path }}
          tenant-org: cspm-triage-test
        env:
          GOMBOC_ACCESS_TOKEN: ${{ secrets.GOMBOC_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CSPM_API_URL: ${{ secrets.CSPM_API_URL }}
          CSPM_API_TOKEN: ${{ secrets.CSPM_API_TOKEN }}
          GOMBOC_API_TOKEN: ${{ secrets.GOMBOC_API_TOKEN }}

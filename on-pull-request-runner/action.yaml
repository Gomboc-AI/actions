name: 'Gomboc ORL On Pull Request Runner'
description: 'Run ORL on pull request changed files (audit or remediate mode)'

inputs:
  mode:
    description: Run mode (audit or remediate)
    required: true
  max-changed-files:
    description: Maximum PR-changed paths to process
    required: false
    default: '50'
  orl-channel:
    description: Rules channel; empty = resolve from GOMBOC_ACCESS_TOKEN JWT
    required: false
    default: ''
  orl-version:
    description: ORL Docker image tag (used when orl-image is empty)
    required: false
    default: 'v1.3.8'
  orl-image:
    description: Full Docker image ref; overrides orl-version when set
    required: false
    default: ''
  rules-service-url:
    description: Gomboc Rules Service base URL
    required: false
    default: 'https://rules.app.gomboc.ai'
  integrations-service-url:
    description: Gomboc Integrations Service base URL
    required: false
    default: 'https://integrations.app.gomboc.ai'
  portal-service-url:
    description: Gomboc portal base URL for rule links in audit comments
    required: false
    default: 'https://app.gomboc.ai'
  integrations-enabled:
    description: POST scan results to Integrations
    required: false
    default: 'true'
  scan-timeout-seconds:
    description: Timeout for each ORL remediate docker run (seconds)
    required: false
    default: '90'
  rules-cache-ttl-hours:
    description: Max age before rules cache is refreshed (hours)
    required: false
    default: '6'
  remediation-branch-prefix:
    description: Branch prefix for remediate stacked PRs (Phase 3)
    required: false
    default: 'gomboc/orl-remediation'
  comment-max-per-pr:
    description: Maximum inline review comments per PR (Phase 2)
    required: false
    default: '50'
  fail-on-findings:
    description: When true, fail the job if findings or changes are greater than zero
    required: false
    default: 'false'
  tenant-org:
    description: Tenant org slug used to scope CSPM rule annotations (e.g. acme)
    required: false
    default: ''
  cspm-observation-id:
    description: Pin CSPM triage to a specific observation ID (workflow_dispatch runs)
    required: false
    default: ''
  cspm-source-path:
    description: Repo-relative path to scan for IaC (workflow_dispatch runs; blank = repo root)
    required: false
    default: ''
  gomboc-skills-ref:
    description: Branch or tag of Gomboc-AI/gomboc-enterprise-skills to use for skills and scripts
    required: false
    default: 'main'

runs:
  using: composite
  steps:
    - name: Require pull_request or workflow_dispatch event
      shell: bash
      run: |
        if [ "${{ github.event_name }}" != "pull_request" ] && \
           [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
          echo "::error::This action only supports pull_request and workflow_dispatch events (got: ${{ github.event_name }})"
          exit 1
        fi

    - name: Skip when triggered by Gomboc bot
      id: its-gomboc
      shell: bash
      run: |
        its_gomboc_prod=${{ github.actor == 'gomboc-ai[bot]' }}
        its_gomboc_beta=${{ github.actor == 'gomboc-ai-beta[bot]' }}
        its_gomboc_local=${{ github.actor == 'gomboc-local-development[bot]' }}
        if [[ $its_gomboc_prod == true || $its_gomboc_beta == true || $its_gomboc_local == true ]]; then
          echo "its_gomboc=true" >> "$GITHUB_OUTPUT"
        else
          echo "its_gomboc=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Skip (Gomboc bot)
      if: steps.its-gomboc.outputs.its_gomboc == 'true'
      shell: bash
      run: echo "Skipping — workflow triggered by Gomboc bot."

    - name: Checkout gomboc-enterprise-skills
      if: steps.its-gomboc.outputs.its_gomboc == 'false'
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        repository: Gomboc-AI/gomboc-enterprise-skills
        ref: ${{ inputs.gomboc-skills-ref }}
        token: ${{ env.GITHUB_TOKEN }}
        path: .gomboc-enterprise-skills

    - id: orl-image
      if: steps.its-gomboc.outputs.its_gomboc == 'false' && github.event_name == 'pull_request'
      shell: bash
      run: |
        if [ -n "${{ inputs.orl-image }}" ]; then
          echo "ref=${{ inputs.orl-image }}" >> "$GITHUB_OUTPUT"
        else
          echo "ref=gombocai/orl:${{ inputs.orl-version }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Cache ORL Docker image
      if: steps.its-gomboc.outputs.its_gomboc == 'false' && github.event_name == 'pull_request'
      id: orl-docker-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: /tmp/orl-image.tar
        key: docker-${{ steps.orl-image.outputs.ref }}

    - name: Pull ORL Docker image
      if: steps.its-gomboc.outputs.its_gomboc == 'false' && github.event_name == 'pull_request' && steps.orl-docker-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        docker pull "${{ steps.orl-image.outputs.ref }}"
        docker save "${{ steps.orl-image.outputs.ref }}" -o /tmp/orl-image.tar

    - name: Load ORL Docker image
      if: steps.its-gomboc.outputs.its_gomboc == 'false' && github.event_name == 'pull_request' && steps.orl-docker-cache.outputs.cache-hit == 'true'
      shell: bash
      run: docker load -i /tmp/orl-image.tar

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      if: steps.its-gomboc.outputs.its_gomboc == 'false'
      with:
        node-version: '24'
        registry-url: https://npm.pkg.github.com
        scope: '@gomboc-ai'

    - name: Install action dependencies
      if: steps.its-gomboc.outputs.its_gomboc == 'false'
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        if [ ! -f node_modules/@gomboc-ai/gomboc-node-sdk/package.json ]; then
          if [ -f package-lock.json ]; then
            npm ci --omit=dev
          else
            npm install --omit=dev
          fi
        fi
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}

    - name: Resolve rules channel
      id: resolve-channel
      if: steps.its-gomboc.outputs.its_gomboc == 'false' && github.event_name == 'pull_request'
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        GOMBOC_ACCESS_TOKEN: ${{ env.GOMBOC_ACCESS_TOKEN }}
        INPUT_ORL_CHANNEL: ${{ inputs.orl-channel }}
      run: node dist/resolve-channel.js

    - name: Cache rules
      if: steps.its-gomboc.outputs.its_gomboc == 'false' && github.event_name == 'pull_request'
      id: rules-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ runner.temp }}/orl-rules
        key: orl-rules-${{ steps.orl-image.outputs.ref }}-${{ inputs.rules-service-url }}-${{ steps.resolve-channel.outputs.channel }}

    - name: Pull rules
      id: pull-rules
      if: steps.its-gomboc.outputs.its_gomboc == 'false' && github.event_name == 'pull_request'
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        GOMBOC_ACCESS_TOKEN: ${{ env.GOMBOC_ACCESS_TOKEN }}
        ORL_IMAGE: ${{ steps.orl-image.outputs.ref }}
        RULES_SERVICE_URL: ${{ inputs.rules-service-url }}
        ORL_CHANNEL: ${{ steps.resolve-channel.outputs.channel }}
        ORL_RULES_DIR: ${{ runner.temp }}/orl-rules
      run: node dist/pull-rules.js

    - name: Resolve PR changed files
      id: resolve-pr-files
      if: steps.its-gomboc.outputs.its_gomboc == 'false' && github.event_name == 'pull_request'
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_MAX_CHANGED_FILES: ${{ inputs.max-changed-files }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
      run: node dist/resolve-pr-files.js

    - name: Discover touched workspaces
      id: discover-workspaces
      if: steps.its-gomboc.outputs.its_gomboc == 'false' && github.event_name == 'pull_request' && steps.resolve-pr-files.outputs.skip != 'true'
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        ORL_IMAGE: ${{ steps.orl-image.outputs.ref }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
      run: node dist/discover-workspaces.js

    - name: Plan evaluation batches
      id: plan-batches
      if: steps.its-gomboc.outputs.its_gomboc == 'false' && github.event_name == 'pull_request' && steps.discover-workspaces.outcome == 'success' && steps.discover-workspaces.outputs.skip != 'true'
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        GITHUB_WORKSPACE: ${{ github.workspace }}
      run: node dist/plan-evaluation-batches.js

    - name: Run ORL
      id: run-orl
      if: steps.its-gomboc.outputs.its_gomboc == 'false' && github.event_name == 'pull_request' && steps.plan-batches.outcome == 'success' && steps.plan-batches.outputs.skip != 'true'
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        ORL_IMAGE: ${{ steps.orl-image.outputs.ref }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
        GITHUB_ACTION_PATH: ${{ github.action_path }}
        ORL_RULES_DIR: ${{ runner.temp }}/orl-rules
        INPUT_SCAN_TIMEOUT_SECONDS: ${{ inputs.scan-timeout-seconds }}
        ORL_REMEDIATE_CONCURRENCY: '3'
      run: node dist/run-orl.js

    - name: Normalize report
      if: steps.its-gomboc.outputs.its_gomboc == 'false' && github.event_name == 'pull_request' && steps.run-orl.outcome == 'success'
      shell: bash
      working-directory: ${{ github.action_path }}
      run: node dist/normalize-report.js

    - name: Setup CSPM agent
      id: setup-cspm-agent
      if: steps.its-gomboc.outputs.its_gomboc == 'false' && (steps.run-orl.outcome == 'success' || github.event_name == 'workflow_dispatch')
      shell: bash
      run: |
        # Register the gomboc-enterprise marketplace with Claude Code so skills
        # are available to the headless agent. This writes to the runner's home
        # directory and is scoped to this job only.
        mkdir -p "$HOME/.claude"
        python3 -c "
        import json, os
        settings = {
          'enabledPlugins': {
            'gomboc@gomboc-enterprise-marketplace': True
          },
          'extraKnownMarketplaces': {
            'gomboc-enterprise-marketplace': {
              'source': {
                'source': 'directory',
                'path': os.path.realpath('${{ github.workspace }}/.gomboc-enterprise-skills')
              }
            }
          }
        }
        print(json.dumps(settings, indent=2))
        " > "$HOME/.claude/settings.json"

    - name: CSPM triage agent
      id: cspm-agent
      continue-on-error: true
      if: steps.its-gomboc.outputs.its_gomboc == 'false' && (steps.run-orl.outcome == 'success' || github.event_name == 'workflow_dispatch')
      working-directory: ${{ github.action_path }}/agent
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
        GOMBOC_ARTIFACTS_ROOT: ${{ runner.temp }}/gomboc-orl
        GOMBOC_SKILLS_ROOT: ${{ github.workspace }}/.gomboc-enterprise-skills
        GOMBOC_RULES_SERVICE_URL: https://rules.dev.gcp.gomboc.ai
        CSPM_API_URL: ${{ env.CSPM_API_URL }}
        CSPM_API_TOKEN: ${{ env.CSPM_API_TOKEN }}
        GOMBOC_API_TOKEN: ${{ env.GOMBOC_API_TOKEN }}
        CSPM_TENANT_ORG: ${{ inputs.tenant-org }}
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
        CSPM_OBSERVATION_ID: ${{ inputs.cspm-observation-id }}
        CSPM_SOURCE_PATH: ${{ inputs.cspm-source-path }}
        CSPM_DRY_RUN: 'true'
      run: |
        set -o pipefail
        mkdir -p "${{ runner.temp }}/gomboc-orl"
        AGENT_OUTPUT="${{ runner.temp }}/gomboc-orl/cspm-agent-output.txt"
        npx --yes @anthropic-ai/claude-code \
          -p "Run the cspm-triage skill in autonomous CI mode as defined in CLAUDE.md. Triage the top CSPM alert against the PR workspace and emit a CSPM_TRIAGE_RESULT block." \
          --permission-mode bypassPermissions \
          --allowedTools "Bash,Read,Grep,LS,Skill,Agent" \
          2>&1 | tee "$AGENT_OUTPUT"

    - name: CSPM triage summary
      id: cspm-summary
      if: steps.cspm-agent.outcome != 'skipped'
      shell: bash
      run: |
        OUTPUT_FILE="${{ runner.temp }}/gomboc-orl/cspm-agent-output.txt"

        if [ ! -f "$OUTPUT_FILE" ]; then
          echo "### Gomboc CSPM Triage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Agent output not found. Agent may not have started." >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        RESULT=$(sed -n '/^CSPM_TRIAGE_RESULT_START$/,/^CSPM_TRIAGE_RESULT_END$/p' "$OUTPUT_FILE" \
          | grep -v '^CSPM_TRIAGE_RESULT_')

        if [ -z "$RESULT" ]; then
          echo "### Gomboc CSPM Triage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No structured result block found in agent output." >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        _get() { echo "$RESULT" | grep "^$1:" | sed "s/^$1: *//" | head -1; }

        STATUS=$(_get STATUS)
        TIER=$(_get TIER)
        CONFIDENCE=$(_get CONFIDENCE)
        CANDIDATES=$(_get CANDIDATES_EVALUATED)
        CONTROL_ID=$(_get CONTROL_ID)
        SEVERITY=$(_get SEVERITY)
        RULE_NAME=$(_get RULE_NAME)
        RULE_RELEASED=$(_get RULE_RELEASED)
        REMEDIATION_TYPE=$(_get REMEDIATION_TYPE)
        FILES_SCANNED=$(_get FILES_SCANNED)
        VIOLATIONS_FOUND=$(_get VIOLATIONS_FOUND)
        DEFERRED_REASON=$(_get DEFERRED_REASON)

        {
          echo "### Gomboc CSPM Triage"
          echo ""
          echo "| Field | Value |"
          echo "|---|---|"
          echo "| Status | $STATUS |"
          if [ "$STATUS" = "success" ]; then
            echo "| Tier | $TIER |"
            echo "| Confidence | $CONFIDENCE |"
            echo "| Control ID | \`$CONTROL_ID\` |"
            echo "| Severity | $SEVERITY |"
            echo "| Rule | \`$RULE_NAME\` |"
            echo "| Rule released | $RULE_RELEASED |"
            echo "| Remediation type | $REMEDIATION_TYPE |"
            echo "| Files scanned | $FILES_SCANNED |"
            echo "| Violations found | $VIOLATIONS_FOUND |"
            if [ "$REMEDIATION_TYPE" = "REMEDIATION_WITH_INPUT" ]; then
              echo ""
              echo "Note: partial fix. Output contains USER_INPUT_N placeholders. Operator-supplied values required before merge."
            fi
          elif [ "$STATUS" = "deferred" ]; then
            echo "| Candidates evaluated | $CANDIDATES |"
            echo "| Reason | $DEFERRED_REASON |"
            echo ""
            echo "No actionable alert found for this PR's workspaces. Manual triage recommended."
          else
            echo "| Reason | $DEFERRED_REASON |"
          fi
        } >> "$GITHUB_STEP_SUMMARY"

        echo "status=$STATUS" >> "$GITHUB_OUTPUT"
        echo "control-id=$CONTROL_ID" >> "$GITHUB_OUTPUT"
        echo "rule-name=$RULE_NAME" >> "$GITHUB_OUTPUT"

    - name: Post Integrations
      if: steps.its-gomboc.outputs.its_gomboc == 'false' && github.event_name == 'pull_request' && steps.run-orl.outcome == 'success'
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        GOMBOC_ACCESS_TOKEN: ${{ env.GOMBOC_ACCESS_TOKEN }}
        INTEGRATIONS_SERVICE_URL: ${{ inputs.integrations-service-url }}
        INPUT_INTEGRATIONS_ENABLED: ${{ inputs.integrations-enabled }}
      run: node dist/post-integrations.js

    - name: Publish audit comments
      if: steps.its-gomboc.outputs.its_gomboc == 'false' && github.event_name == 'pull_request' && steps.run-orl.outcome == 'success' && inputs.mode == 'audit'
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
        INPUT_COMMENT_MAX_PER_PR: ${{ inputs.comment-max-per-pr }}
        INPUT_PORTAL_SERVICE_URL: ${{ inputs.portal-service-url }}
      run: node dist/publish-audit-comments.js

    - name: Open remediation PR
      if: steps.its-gomboc.outputs.its_gomboc == 'false' && github.event_name == 'pull_request' && steps.run-orl.outcome == 'success' && inputs.mode == 'remediate'
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_REMEDIATION_BRANCH_PREFIX: ${{ inputs.remediation-branch-prefix }}
        INPUT_COMMENT_MAX_PER_PR: ${{ inputs.comment-max-per-pr }}
        INPUT_PORTAL_SERVICE_URL: ${{ inputs.portal-service-url }}
      run: node dist/open-remediation-pr.js

    - name: Upload ORL artifacts
      if: steps.its-gomboc.outputs.its_gomboc == 'false' && github.event_name == 'pull_request' && steps.run-orl.outcome == 'success'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: gomboc-orl-report
        path: ${{ runner.temp }}/gomboc-orl/
        retention-days: 14
